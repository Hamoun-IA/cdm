# WC26 Cockpit — un service app + volume ./data (PLAN §2).
# Bind loopback (pod OpenClaw local) + IP Tailscale (accès tailnet
# http://hermes-vps:3026) — jamais 0.0.0.0 : le VPS a une IP publique et
# l'API est sans auth. « La sécurité périmétrique est assurée par Tailscale »
# — voir DECISIONS.md. Si l'IP Tailscale change, mettre à jour ici.
services:
  cockpit:
    build: .
    container_name: wc26-cockpit
    ports:
      - "127.0.0.1:3026:3026"
      - "100.123.18.2:3026:3026"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3026/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  backup:
    build: .
    container_name: wc26-cockpit-backup
    env_file:
      - .env
    environment:
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_DIR: ${BACKUP_DIR:-/app/data/backups}
    volumes:
      - ./data:/app/data
    command: ["node", "server/src/backup.js", "--loop"]
    depends_on:
      - cockpit
    restart: unless-stopped
